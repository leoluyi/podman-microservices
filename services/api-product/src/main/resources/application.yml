server:
  port: 8080

spring:
  application:
    name: api-product
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://postgres:5432/microservices
    username: app_user
    password: ${DB_PASSWORD:dev-password-change-me}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.example: INFO
