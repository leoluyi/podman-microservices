# /etc/nginx/conf.d/upstream.conf
# ============================================================================
# 後端服務定義（多副本負載均衡）
# ============================================================================
# 每個 upstream 列出所有副本的 container 名稱
# 副本數量需與 configs/ha.conf 中的設定一致
#
# 負載均衡策略：
#   (預設)      Round Robin — 各 instance 效能一致時使用
#   least_conn  最少連線數 — 請求處理時間不均勻時使用
#   ip_hash     IP 雜湊   — 需要 session sticky 時使用
#
# 被動健康檢查：
#   max_fails=3      連續失敗 3 次後暫時移除
#   fail_timeout=30s 移除 30 秒後重新嘗試

# Frontend 服務（2 副本）
upstream frontend {
    least_conn;
    server frontend-1:80 max_fails=3 fail_timeout=30s;
    server frontend-2:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# BFF Gateway 服務（2 副本）
upstream bff {
    least_conn;
    server bff-1:8080 max_fails=3 fail_timeout=30s;
    server bff-2:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# API-User 服務（2 副本）
upstream api-user {
    least_conn;
    server api-user-1:8080 max_fails=3 fail_timeout=30s;
    server api-user-2:8080 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# API-Order 服務（2 副本）
upstream api-order {
    least_conn;
    server api-order-1:8080 max_fails=3 fail_timeout=30s;
    server api-order-2:8080 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# API-Product 服務（2 副本）
upstream api-product {
    least_conn;
    server api-product-1:8080 max_fails=3 fail_timeout=30s;
    server api-product-2:8080 max_fails=3 fail_timeout=30s;
    keepalive 16;
}
