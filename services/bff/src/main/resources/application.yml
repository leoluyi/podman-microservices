server:
  port: 8080

spring:
  application:
    name: bff
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://api-auth:8080
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: user-service
          uri: http://api-user:8080
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - StripPrefix=1
            - JwtAuth

        - id: order-service
          uri: http://api-order:8080
          predicates:
            - Path=/api/orders,/api/orders/**
          filters:
            - StripPrefix=1
            - JwtAuth

        - id: product-service
          uri: http://api-product:8080
          predicates:
            - Path=/api/products,/api/products/**
          filters:
            - StripPrefix=1
            - JwtAuth
jwt:
  signing-key: ${JWT_SIGNING_KEY:dev-jwt-secret-key-minimum-32-characters-long!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.example: INFO
