# configs/bff/nginx.conf
# 佔位用途：讓 nginx:alpine 監聽 8080 以符合 upstream.conf 設定
# 實際部署請替換為 localhost/bff:latest（Spring Boot 監聽 8080）

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        server_name _;

        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"bff-placeholder"}';
            add_header Content-Type application/json;
        }

        location /api/ {
            return 503 '{"error":"BFF not implemented","message":"Replace nginx:alpine with actual BFF image"}';
            add_header Content-Type application/json;
        }
    }
}
